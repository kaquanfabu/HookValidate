name: build

on:
  push:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    container:
      image: ghcr.io/theos/theos:latest

    steps:

      - uses: actions/checkout@v4

      - name: Build tweak
        run: make package

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: tweak
          path: packages/*.deb

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: dylib
          path: .theos/obj/debug/*.dylib
